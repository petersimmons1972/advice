<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%">
  <defs>
    <filter id="shadow-standard" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8C8C8C"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4A843"/>
    </marker>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-ivory { fill: #1A1A2E; }
        .text-navy { fill: #F5F0E8; }
        .text-charcoal { fill: #E0E0E0; }
        .border-navy { stroke: #4A7C9B; }
        .card-fill { fill: #2B2B3D; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-ivory" width="600" height="600" fill="#F5F0E8" rx="0"/>

  <!-- Title Block -->
  <rect x="40" y="30" width="520" height="60" fill="#1B3A5C" rx="0"/>
  <text x="300" y="58" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="22" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">VENDOR CONSOLIDATION FLOW</text>
  <text x="300" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#D4A843" text-anchor="middle" letter-spacing="0.05em">MULTI-PROJECT GUIDANCE — UNIFIED IN ADVICE</text>

  <!-- Subtitle -->
  <text x="300" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">UPSTREAM PROJECTS FEED INTO UNIFIED REPOSITORY</text>

  <!-- Source Project Cards Row -->
  <!-- Clearwatch -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="40" y="140" width="155" height="110" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="40" y="140" width="155" height="28" fill="#2D6A4F" rx="4"/>
    <rect x="40" y="164" width="155" height="4" fill="#2D6A4F"/>
    <text x="117" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">CLEARWATCH</text>
    <text x="117" y="190" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">EDR Reports</text>
    <text x="117" y="204" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Vendor Grading</text>
    <text x="117" y="218" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Threat Analysis</text>
    <text x="117" y="236" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="middle" font-style="italic">Revenue pipeline</text>
  </g>

  <!-- Infrastructure -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="222" y="140" width="155" height="110" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="222" y="140" width="155" height="28" fill="#4A7C9B" rx="4"/>
    <rect x="222" y="164" width="155" height="4" fill="#4A7C9B"/>
    <text x="299" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">INFRASTRUCTURE</text>
    <text x="299" y="190" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">K8s Policies</text>
    <text x="299" y="204" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Cert Management</text>
    <text x="299" y="218" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Network Security</text>
    <text x="299" y="236" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="middle" font-style="italic">Cluster stability</text>
  </g>

  <!-- Homelab -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="404" y="140" width="155" height="110" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="404" y="140" width="155" height="28" fill="#6B3A2A" rx="4"/>
    <rect x="404" y="164" width="155" height="4" fill="#6B3A2A"/>
    <text x="481" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">HOMELAB</text>
    <text x="481" y="190" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Image Hardening</text>
    <text x="481" y="204" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Vuln Scanning</text>
    <text x="481" y="218" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="middle">Update Strategy</text>
    <text x="481" y="236" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="middle" font-style="italic">Lab environment</text>
  </g>

  <!-- Flow Arrows Down from source projects -->
  <line x1="117" y1="255" x2="117" y2="295" stroke="#8C8C8C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="299" y1="255" x2="299" y2="295" stroke="#8C8C8C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="481" y1="255" x2="481" y2="295" stroke="#8C8C8C" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Convergence Lines -->
  <line x1="117" y1="295" x2="300" y2="330" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="299" y1="295" x2="300" y2="330" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="481" y1="295" x2="300" y2="330" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Central Advice Box -->
  <g filter="url(#shadow-elevated)">
    <rect class="card-fill" x="110" y="330" width="380" height="110" fill="#FFFFFF" stroke="#D4A843" stroke-width="3" rx="4"/>
    <rect x="110" y="330" width="380" height="32" fill="#D4A843" rx="4"/>
    <rect x="110" y="358" width="380" height="4" fill="#D4A843"/>
    <text x="300" y="352" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="16" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.05em">ADVICE REPOSITORY</text>
    <text x="300" y="385" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B" text-anchor="middle">Vendor-Agnostic Security Guidance</text>
    <text x="300" y="403" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B" text-anchor="middle">Reconciled Policies &amp; Enforceable Standards</text>
    <text x="300" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6B3A2A" text-anchor="middle" font-weight="600">Chainguard + NIST + AWS + GCP + GitHub</text>
  </g>

  <!-- Output Arrows -->
  <line x1="200" y1="445" x2="140" y2="485" stroke="#D4A843" stroke-width="1.5" marker-end="url(#arrow-gold)"/>
  <line x1="300" y1="445" x2="300" y2="485" stroke="#D4A843" stroke-width="1.5" marker-end="url(#arrow-gold)"/>
  <line x1="400" y1="445" x2="460" y2="485" stroke="#D4A843" stroke-width="1.5" marker-end="url(#arrow-gold)"/>

  <!-- Output Labels -->
  <g>
    <rect x="65" y="488" width="150" height="36" fill="#1B3A5C" rx="2"/>
    <text x="140" y="511" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" fill="#F5F0E8" text-anchor="middle">MACHINE-READABLE</text>
    <text x="140" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#D4A843" text-anchor="middle">JSON / YAML / REGO</text>
  </g>
  <g>
    <rect x="225" y="488" width="150" height="36" fill="#1B3A5C" rx="2"/>
    <text x="300" y="511" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" fill="#F5F0E8" text-anchor="middle">ENFORCEABLE</text>
    <text x="300" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#D4A843" text-anchor="middle">KYVERNO / OPA / CI</text>
  </g>
  <g>
    <rect x="385" y="488" width="150" height="36" fill="#1B3A5C" rx="2"/>
    <text x="460" y="511" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" fill="#F5F0E8" text-anchor="middle">AUDITABLE</text>
    <text x="460" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#D4A843" text-anchor="middle">TRACEABLE DECISIONS</text>
  </g>

  <!-- Footer -->
  <text x="300" y="565" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">ADVICE — VENDOR CONSOLIDATION FLOW — SIMMONS &amp; PARTNERS 2026</text>
</svg>
