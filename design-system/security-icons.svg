<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%">
  <defs>
    <style>
      .icon-stroke { stroke: #1B3A5C; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #8C8C8C; text-anchor: middle; letter-spacing: 0.05em; }
      .icon-title { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-size: 11px; fill: #1B3A5C; text-anchor: middle; }
      @media (prefers-color-scheme: dark) {
        .bg-ivory { fill: #1A1A2E; }
        .icon-stroke { stroke: #F5F0E8; }
        .icon-label { fill: #8C8C8C; }
        .icon-title { fill: #F5F0E8; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-ivory" width="960" height="540" fill="#F5F0E8"/>

  <!-- Title -->
  <text x="480" y="36" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="22" fill="#1B3A5C" text-anchor="middle" letter-spacing="0.05em">SECURITY CONCEPT ICON SET</text>
  <text x="480" y="54" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">64 x 64 GRID — 2PX STROKE — STERLING NAVY</text>

  <!-- Row 1 -->
  <!-- Icon 1: Threat (Shield + Exclamation) -->
  <g transform="translate(56, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2" rx="0"/>
    <path d="M32 8 L52 18 L52 34 C52 46 42 54 32 58 C22 54 12 46 12 34 L12 18 Z" class="icon-stroke"/>
    <line x1="32" y1="26" x2="32" y2="38" class="icon-stroke" stroke-width="2.5"/>
    <circle cx="32" cy="44" r="1.5" fill="#1B3A5C"/>
    <text x="32" y="78" class="icon-title">Threat</text>
    <text x="32" y="92" class="icon-label">SHIELD + ALERT</text>
  </g>

  <!-- Icon 2: Compliance (Checkmark in Circle) -->
  <g transform="translate(152, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="32" cy="32" r="22" class="icon-stroke"/>
    <polyline points="21,32 28,40 43,24" class="icon-stroke" stroke-width="2.5"/>
    <text x="32" y="78" class="icon-title">Compliance</text>
    <text x="32" y="92" class="icon-label">CHECK IN CIRCLE</text>
  </g>

  <!-- Icon 3: Automation (Gears) -->
  <g transform="translate(248, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <!-- Large gear -->
    <circle cx="26" cy="28" r="10" class="icon-stroke"/>
    <circle cx="26" cy="28" r="4" class="icon-stroke"/>
    <!-- Gear teeth (large) -->
    <line x1="26" y1="16" x2="26" y2="18" class="icon-stroke" stroke-width="3"/>
    <line x1="26" y1="38" x2="26" y2="40" class="icon-stroke" stroke-width="3"/>
    <line x1="14" y1="28" x2="16" y2="28" class="icon-stroke" stroke-width="3"/>
    <line x1="36" y1="28" x2="38" y2="28" class="icon-stroke" stroke-width="3"/>
    <!-- Small gear -->
    <circle cx="42" cy="40" r="7" class="icon-stroke"/>
    <circle cx="42" cy="40" r="3" class="icon-stroke"/>
    <line x1="42" y1="31" x2="42" y2="33" class="icon-stroke" stroke-width="2.5"/>
    <line x1="42" y1="47" x2="42" y2="49" class="icon-stroke" stroke-width="2.5"/>
    <text x="32" y="78" class="icon-title">Automation</text>
    <text x="32" y="92" class="icon-label">INTERLOCKING GEARS</text>
  </g>

  <!-- Icon 4: Vulnerability (Cracked Shield) -->
  <g transform="translate(344, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M32 8 L52 18 L52 34 C52 46 42 54 32 58 C22 54 12 46 12 34 L12 18 Z" class="icon-stroke"/>
    <!-- Crack -->
    <polyline points="32,14 28,24 35,30 29,38 34,48" class="icon-stroke" stroke-width="1.5"/>
    <text x="32" y="78" class="icon-title">Vulnerability</text>
    <text x="32" y="92" class="icon-label">CRACKED SHIELD</text>
  </g>

  <!-- Icon 5: Monitoring (Eye) -->
  <g transform="translate(440, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M8 32 C16 18 48 18 56 32 C48 46 16 46 8 32 Z" class="icon-stroke"/>
    <circle cx="32" cy="32" r="8" class="icon-stroke"/>
    <circle cx="32" cy="32" r="3" fill="#1B3A5C"/>
    <text x="32" y="78" class="icon-title">Monitoring</text>
    <text x="32" y="92" class="icon-label">WATCHFUL EYE</text>
  </g>

  <!-- Icon 6: Policy (Document + Seal) -->
  <g transform="translate(536, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <rect x="14" y="8" width="30" height="40" class="icon-stroke" rx="2"/>
    <line x1="20" y1="18" x2="38" y2="18" class="icon-stroke" stroke-width="1.5"/>
    <line x1="20" y1="24" x2="38" y2="24" class="icon-stroke" stroke-width="1.5"/>
    <line x1="20" y1="30" x2="32" y2="30" class="icon-stroke" stroke-width="1.5"/>
    <!-- Seal -->
    <circle cx="40" cy="46" r="10" class="icon-stroke" stroke-width="1.5"/>
    <circle cx="40" cy="46" r="5" class="icon-stroke" stroke-width="1.5"/>
    <text x="32" y="78" class="icon-title">Policy</text>
    <text x="32" y="92" class="icon-label">DOCUMENT + SEAL</text>
  </g>

  <!-- Icon 7: Vendor (Building) -->
  <g transform="translate(632, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <rect x="14" y="18" width="36" height="38" class="icon-stroke"/>
    <polygon points="32,8 54,18 10,18" class="icon-stroke"/>
    <!-- Windows -->
    <rect x="20" y="26" width="8" height="8" class="icon-stroke" stroke-width="1.5"/>
    <rect x="36" y="26" width="8" height="8" class="icon-stroke" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="27" y="42" width="10" height="14" class="icon-stroke" stroke-width="1.5"/>
    <text x="32" y="78" class="icon-title">Vendor</text>
    <text x="32" y="92" class="icon-label">BUILDING</text>
  </g>

  <!-- Icon 8: Integration (Puzzle Pieces) -->
  <g transform="translate(728, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <!-- Left piece -->
    <path d="M12 16 L28 16 L28 22 C32 22 32 28 28 28 L28 34 L12 34 Z" class="icon-stroke"/>
    <!-- Right piece -->
    <path d="M28 16 L28 22 C32 22 32 28 28 28 L28 34 L44 34 L44 28 C48 28 48 22 44 22 L44 16 Z" class="icon-stroke"/>
    <!-- Bottom piece -->
    <path d="M12 34 L28 34 L28 40 C32 40 32 46 28 46 L28 52 L12 52 Z" class="icon-stroke"/>
    <text x="32" y="78" class="icon-title">Integration</text>
    <text x="32" y="92" class="icon-label">PUZZLE PIECES</text>
  </g>

  <!-- Icon 9: Performance (Gauge) -->
  <g transform="translate(824, 80)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M10 44 A22 22 0 0 1 54 44" class="icon-stroke"/>
    <!-- Tick marks -->
    <line x1="14" y1="36" x2="18" y2="38" class="icon-stroke" stroke-width="1.5"/>
    <line x1="32" y1="22" x2="32" y2="26" class="icon-stroke" stroke-width="1.5"/>
    <line x1="50" y1="36" x2="46" y2="38" class="icon-stroke" stroke-width="1.5"/>
    <!-- Needle -->
    <line x1="32" y1="44" x2="44" y2="30" stroke="#C23B22" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="44" r="3" fill="#1B3A5C"/>
    <text x="32" y="78" class="icon-title">Performance</text>
    <text x="32" y="92" class="icon-label">SPEEDOMETER</text>
  </g>

  <!-- Row 2 -->
  <!-- Icon 10: Lock/Security (Padlock) -->
  <g transform="translate(56, 220)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <rect x="16" y="28" width="32" height="24" class="icon-stroke" rx="2"/>
    <path d="M22 28 L22 20 C22 12 42 12 42 20 L42 28" class="icon-stroke"/>
    <circle cx="32" cy="40" r="3" fill="#1B3A5C"/>
    <line x1="32" y1="43" x2="32" y2="48" class="icon-stroke" stroke-width="2"/>
    <text x="32" y="78" class="icon-title">Security</text>
    <text x="32" y="92" class="icon-label">PADLOCK</text>
  </g>

  <!-- Icon 11: Alert/Critical (Bell) -->
  <g transform="translate(152, 220)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M24 44 L18 44 C18 44 18 26 32 22 C46 26 46 44 46 44 L40 44" class="icon-stroke"/>
    <line x1="24" y1="44" x2="40" y2="44" class="icon-stroke"/>
    <path d="M27 44 C27 50 37 50 37 44" class="icon-stroke"/>
    <line x1="32" y1="14" x2="32" y2="22" class="icon-stroke"/>
    <text x="32" y="78" class="icon-title">Alert</text>
    <text x="32" y="92" class="icon-label">NOTIFICATION BELL</text>
  </g>

  <!-- Icon 12: Network (Nodes) -->
  <g transform="translate(248, 220)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="32" cy="16" r="6" class="icon-stroke"/>
    <circle cx="16" cy="44" r="6" class="icon-stroke"/>
    <circle cx="48" cy="44" r="6" class="icon-stroke"/>
    <line x1="28" y1="21" x2="19" y2="39" class="icon-stroke" stroke-width="1.5"/>
    <line x1="36" y1="21" x2="45" y2="39" class="icon-stroke" stroke-width="1.5"/>
    <line x1="22" y1="44" x2="42" y2="44" class="icon-stroke" stroke-width="1.5"/>
    <text x="32" y="78" class="icon-title">Network</text>
    <text x="32" y="92" class="icon-label">CONNECTED NODES</text>
  </g>

  <!-- Icon 13: Data/Database (Cylinder) -->
  <g transform="translate(344, 220)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <ellipse cx="32" cy="16" rx="18" ry="6" class="icon-stroke"/>
    <line x1="14" y1="16" x2="14" y2="48" class="icon-stroke"/>
    <line x1="50" y1="16" x2="50" y2="48" class="icon-stroke"/>
    <ellipse cx="32" cy="48" rx="18" ry="6" class="icon-stroke"/>
    <text x="32" y="78" class="icon-title">Data</text>
    <text x="32" y="92" class="icon-label">DATABASE</text>
  </g>

  <!-- Icon 14: Deploy (Rocket) -->
  <g transform="translate(440, 220)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M32 10 C32 10 44 18 44 36 L38 42 L26 42 L20 36 C20 18 32 10 32 10 Z" class="icon-stroke"/>
    <circle cx="32" cy="26" r="4" class="icon-stroke"/>
    <path d="M20 36 L14 40 L18 44 L26 42" class="icon-stroke"/>
    <path d="M44 36 L50 40 L46 44 L38 42" class="icon-stroke"/>
    <path d="M28 42 L28 50 L32 54 L36 50 L36 42" class="icon-stroke"/>
    <text x="32" y="78" class="icon-title">Deploy</text>
    <text x="32" y="92" class="icon-label">ROCKET</text>
  </g>

  <!-- Icon 15: Search/Audit (Magnifying Glass) -->
  <g transform="translate(536, 220)">
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="28" cy="28" r="14" class="icon-stroke"/>
    <line x1="38" y1="38" x2="52" y2="52" class="icon-stroke" stroke-width="2.5"/>
    <text x="32" y="78" class="icon-title">Audit</text>
    <text x="32" y="92" class="icon-label">MAGNIFYING GLASS</text>
  </g>

  <!-- Usage Guide -->
  <g transform="translate(40, 400)">
    <rect x="0" y="0" width="880" height="100" fill="none" stroke="#1B3A5C" stroke-width="1"/>
    <rect x="0" y="0" width="880" height="24" fill="#1B3A5C"/>
    <text x="440" y="16" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">USAGE GUIDELINES</text>
    <text x="20" y="44" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">Grid: 64 x 64px with 4px padding (56px safe area)</text>
    <text x="20" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">Stroke: 2px uniform weight, Sterling Navy (#1B3A5C)</text>
    <text x="20" y="76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">Style: Stroke only — no fills except status indicators</text>
    <text x="450" y="44" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">Angles: 45-degree diagonals, geometric construction</text>
    <text x="450" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">Color override: Use functional palette for status (red/amber/green)</text>
    <text x="450" y="76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">Minimum size: 32px (below this, simplify to single shape)</text>
  </g>

  <!-- Footer -->
  <text x="480" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">SIMMONS &amp; PARTNERS — ICON SYSTEM v1.0 — 15 CONCEPTS — 2026</text>
</svg>
