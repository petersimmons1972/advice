<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%">
  <defs>
    <filter id="shadow-standard" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.2"/>
    </filter>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-ivory { fill: #1A1A2E; }
        .text-navy { fill: #F5F0E8; }
        .text-charcoal { fill: #E0E0E0; }
        .card-fill { fill: #2B2B3D; }
        .border-navy { stroke: #4A7C9B; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg-ivory" width="960" height="540" fill="#F5F0E8"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="56" fill="#1B3A5C"/>
  <text x="40" y="36" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="24" fill="#F5F0E8" letter-spacing="0.05em">STATUS DASHBOARD</text>
  <text x="920" y="36" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#D4A843" text-anchor="end" letter-spacing="0.05em">{{DATE}}</text>

  <!-- KPI Row -->
  <!-- KPI 1 -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="40" y="80" width="200" height="100" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <text x="140" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">CRITICAL VULNS</text>
    <text x="140" y="148" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#C23B22" text-anchor="middle">{{KPI_1}}</text>
    <text x="140" y="168" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle">{{KPI_1_DELTA}}</text>
  </g>

  <!-- KPI 2 -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="260" y="80" width="200" height="100" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <text x="360" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">COMPLIANCE SCORE</text>
    <text x="360" y="148" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#2D6A4F" text-anchor="middle">{{KPI_2}}</text>
    <text x="360" y="168" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle">{{KPI_2_DELTA}}</text>
  </g>

  <!-- KPI 3 -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="480" y="80" width="200" height="100" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <text x="580" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">MEAN TIME TO FIX</text>
    <text x="580" y="148" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#D4A843" text-anchor="middle">{{KPI_3}}</text>
    <text x="580" y="168" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle">{{KPI_3_DELTA}}</text>
  </g>

  <!-- KPI 4 -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="700" y="80" width="220" height="100" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <text x="810" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">SERVICES MONITORED</text>
    <text x="810" y="148" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#1B3A5C" text-anchor="middle">{{KPI_4}}</text>
    <text x="810" y="168" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C" text-anchor="middle">{{KPI_4_DELTA}}</text>
  </g>

  <!-- Status Table -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="40" y="210" width="540" height="290" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <!-- Table header -->
    <rect x="40" y="210" width="540" height="30" fill="#1B3A5C" rx="4"/>
    <rect x="40" y="236" width="540" height="4" fill="#1B3A5C"/>
    <text x="60" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" letter-spacing="0.05em">SERVICE</text>
    <text x="280" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" letter-spacing="0.05em">STATUS</text>
    <text x="420" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" letter-spacing="0.05em">LAST CHECK</text>

    <!-- Row 1 -->
    <text x="60" y="265" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2B2B2B">{{SERVICE_1}}</text>
    <circle cx="290" cy="261" r="5" fill="{{STATUS_COLOR_1}}"/>
    <text x="302" y="265" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">{{STATUS_TEXT_1}}</text>
    <text x="420" y="265" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C">{{LAST_CHECK_1}}</text>

    <!-- Row separator -->
    <line x1="56" y1="278" x2="564" y2="278" stroke="#8C8C8C" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 2 -->
    <text x="60" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2B2B2B">{{SERVICE_2}}</text>
    <circle cx="290" cy="294" r="5" fill="{{STATUS_COLOR_2}}"/>
    <text x="302" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">{{STATUS_TEXT_2}}</text>
    <text x="420" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C">{{LAST_CHECK_2}}</text>

    <line x1="56" y1="311" x2="564" y2="311" stroke="#8C8C8C" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 3 -->
    <text x="60" y="331" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2B2B2B">{{SERVICE_3}}</text>
    <circle cx="290" cy="327" r="5" fill="{{STATUS_COLOR_3}}"/>
    <text x="302" y="331" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">{{STATUS_TEXT_3}}</text>
    <text x="420" y="331" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C">{{LAST_CHECK_3}}</text>

    <line x1="56" y1="344" x2="564" y2="344" stroke="#8C8C8C" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 4 -->
    <text x="60" y="364" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2B2B2B">{{SERVICE_4}}</text>
    <circle cx="290" cy="360" r="5" fill="{{STATUS_COLOR_4}}"/>
    <text x="302" y="364" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">{{STATUS_TEXT_4}}</text>
    <text x="420" y="364" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C">{{LAST_CHECK_4}}</text>

    <line x1="56" y1="377" x2="564" y2="377" stroke="#8C8C8C" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 5 -->
    <text x="60" y="397" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2B2B2B">{{SERVICE_5}}</text>
    <circle cx="290" cy="393" r="5" fill="{{STATUS_COLOR_5}}"/>
    <text x="302" y="397" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2B2B2B">{{STATUS_TEXT_5}}</text>
    <text x="420" y="397" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8C8C8C">{{LAST_CHECK_5}}</text>
  </g>

  <!-- Severity Breakdown Panel -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="610" y="210" width="310" height="180" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="610" y="210" width="310" height="30" fill="#1B3A5C" rx="4"/>
    <rect x="610" y="236" width="310" height="4" fill="#1B3A5C"/>
    <text x="765" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="11" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">SEVERITY BREAKDOWN</text>

    <!-- Bar chart -->
    <!-- Critical -->
    <text x="630" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">CRITICAL</text>
    <rect x="700" y="258" width="{{BAR_CRITICAL}}" height="16" fill="#C23B22" rx="1"/>
    <text x="898" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="end">{{COUNT_CRITICAL}}</text>

    <!-- High -->
    <text x="630" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">HIGH</text>
    <rect x="700" y="286" width="{{BAR_HIGH}}" height="16" fill="#D4842A" rx="1"/>
    <text x="898" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="end">{{COUNT_HIGH}}</text>

    <!-- Medium -->
    <text x="630" y="326" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">MEDIUM</text>
    <rect x="700" y="314" width="{{BAR_MEDIUM}}" height="16" fill="#D4A843" rx="1"/>
    <text x="898" y="326" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="end">{{COUNT_MEDIUM}}</text>

    <!-- Low -->
    <text x="630" y="354" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">LOW</text>
    <rect x="700" y="342" width="{{BAR_LOW}}" height="16" fill="#2D6A4F" rx="1"/>
    <text x="898" y="354" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B" text-anchor="end">{{COUNT_LOW}}</text>
  </g>

  <!-- Recent Activity Panel -->
  <g filter="url(#shadow-standard)">
    <rect class="card-fill" x="610" y="410" width="310" height="90" fill="#FFFFFF" stroke="#1B3A5C" stroke-width="2" rx="4"/>
    <rect x="610" y="410" width="310" height="26" fill="#1B3A5C" rx="4"/>
    <rect x="610" y="432" width="310" height="4" fill="#1B3A5C"/>
    <text x="765" y="428" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="10" fill="#F5F0E8" text-anchor="middle" letter-spacing="0.05em">RECENT ACTIVITY</text>
    <text x="626" y="458" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">{{ACTIVITY_1}}</text>
    <text x="626" y="476" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#2B2B2B">{{ACTIVITY_2}}</text>
    <text x="626" y="494" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8C8C8C">{{ACTIVITY_3}}</text>
  </g>

  <!-- Footer -->
  <text x="480" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="middle" letter-spacing="0.08em">{{PROJECT_NAME}} — STATUS DASHBOARD — SIMMONS &amp; PARTNERS 2026</text>
</svg>
