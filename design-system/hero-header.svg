<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <filter id="shadow-elevated" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#2B2B2B" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="ivory-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <pattern id="linen" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="transparent"/>
      <line x1="0" y1="0" x2="8" y2="8" stroke="#1B3A5C" stroke-width="0.3" opacity="0.06"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#1B3A5C" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg-main { fill: #1A1A2E; }
        .bg-navy { fill: #0D1B2A; }
        .text-display { fill: #F5F0E8; }
        .text-body { fill: #E0E0E0; }
        .accent-line { stroke: #D4A843; }
      }
    </style>
  </defs>

  <!-- Background layers -->
  <rect class="bg-main" width="1200" height="400" fill="url(#ivory-fade)"/>
  <rect width="1200" height="400" fill="url(#linen)"/>

  <!-- Navy sidebar accent -->
  <rect class="bg-navy" x="0" y="0" width="60" height="400" fill="#1B3A5C"/>

  <!-- Double rule top -->
  <line x1="60" y1="40" x2="1160" y2="40" stroke="#1B3A5C" stroke-width="2"/>
  <line x1="60" y1="46" x2="1160" y2="46" stroke="#1B3A5C" stroke-width="1"/>

  <!-- Double rule bottom -->
  <line x1="60" y1="354" x2="1160" y2="354" stroke="#1B3A5C" stroke-width="1"/>
  <line x1="60" y1="360" x2="1160" y2="360" stroke="#1B3A5C" stroke-width="2"/>

  <!-- Decorative elements on sidebar -->
  <rect x="18" y="80" width="24" height="24" fill="none" stroke="#D4A843" stroke-width="1.5"/>
  <rect x="22" y="84" width="16" height="16" fill="#D4A843" opacity="0.3"/>

  <rect x="18" y="170" width="24" height="24" fill="none" stroke="#F5F0E8" stroke-width="1" opacity="0.4"/>
  <rect x="18" y="210" width="24" height="24" fill="none" stroke="#F5F0E8" stroke-width="1" opacity="0.3"/>
  <rect x="18" y="250" width="24" height="24" fill="none" stroke="#F5F0E8" stroke-width="1" opacity="0.2"/>

  <!-- Title block -->
  <text class="text-display" x="120" y="150" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="56" fill="#1B3A5C" letter-spacing="0.03em">{{PROJECT_NAME}}</text>

  <!-- Gold accent line under title -->
  <line class="accent-line" x1="120" y1="168" x2="520" y2="168" stroke="#D4A843" stroke-width="3"/>

  <!-- Subtitle -->
  <text class="text-body" x="120" y="210" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#2B2B2B">{{SUBTITLE_LINE_1}}</text>
  <text class="text-body" x="120" y="238" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8C8C8C">{{SUBTITLE_LINE_2}}</text>

  <!-- Status badge -->
  <g filter="url(#shadow-elevated)" transform="translate(120, 270)">
    <rect width="120" height="32" fill="#2D6A4F" rx="2"/>
    <text x="60" y="21" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.05em">{{STATUS}}</text>
  </g>

  <!-- Right-side decorative shield icon -->
  <g transform="translate(980, 100)" opacity="0.08">
    <path d="M60 0 L120 20 L120 60 C120 100 80 130 60 140 C40 130 0 100 0 60 L0 20 Z" fill="#1B3A5C"/>
  </g>

  <!-- Attribution -->
  <text x="1140" y="384" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8C8C8C" text-anchor="end" letter-spacing="0.05em">SIMMONS &amp; PARTNERS 2026</text>
</svg>
